name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare deploy directory
        run: |
          cp -r . /tmp/deploy

      - name: Restore ships snapshot
        run: |
          git fetch origin gh-pages
          git show origin/gh-pages:data/ships.json > /tmp/deploy/data/ships.json 2>/dev/null \
            && echo 'ships.json restored from gh-pages' \
            || echo 'ships.json not found on gh-pages — skipping'

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: /tmp/deploy
          exclude_assets: '.github,scripts,node_modules,.gitignore'
