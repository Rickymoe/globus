<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planet Simulator</title>
  <link rel="stylesheet" href="css/style.css">
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/",
      "topojson-client": "https://cdn.jsdelivr.net/npm/topojson-client@3.1.0/+esm"
    }
  }
  </script>
</head>
<body>
  <div id="canvas-container">
    <div id="compass" title="Klikk for å nullstille">
      <div id="compass-needle"></div>
      <span class="compass-n">N</span>
      <span class="compass-s">S</span>
    </div>
    <div id="toggle-stack">
      <div id="drag-toggle" class="float-toggle" title="Flytt land (klikk for å velge, dra for å flytte)">
        <span class="toggle-icon">✋</span>
        <div class="toggle-track"><div class="toggle-thumb"></div></div>
      </div>
      <div id="labels-toggle" class="float-toggle" title="Landenavn">
        <span class="toggle-icon">🚩</span>
        <div class="toggle-track"><div class="toggle-thumb"></div></div>
      </div>
<div id="borders-toggle" class="float-toggle active" title="Landegrenser">
        <span class="toggle-icon">🗺</span>
        <div class="toggle-track"><div class="toggle-thumb"></div></div>
      </div>
      <div id="transparent-toggle" class="float-toggle" title="Gjennomsiktig modus">
        <span class="toggle-icon">👁</span>
        <div class="toggle-track"><div class="toggle-thumb"></div></div>
      </div>
      <div id="equator-toggle" class="float-toggle" title="Ekvator">
        <span class="toggle-icon">🌐</span>
        <div class="toggle-track"><div class="toggle-thumb"></div></div>
      </div>
      <div id="capitals-toggle" class="float-toggle" title="Hovedsteder">
        <span class="toggle-icon">🏛</span>
        <div class="toggle-track"><div class="toggle-thumb"></div></div>
      </div>
      <div id="solar-toggle" class="float-toggle" title="Solsystem">
        <span class="toggle-icon">🪐</span>
        <div class="toggle-track"><div class="toggle-thumb"></div></div>
      </div>
      <div id="sun-toggle" class="float-toggle" title="Sol (dag/natt)">
        <span class="toggle-icon">🌞</span>
        <div class="toggle-track"><div class="toggle-thumb"></div></div>
      </div>
      <div id="citylights-toggle" class="float-toggle" title="Bybelysning (fungerer best med sol på)">
        <span class="toggle-icon">🌃</span>
        <div class="toggle-track"><div class="toggle-thumb"></div></div>
      </div>
      <div id="weather-toggle" class="float-toggle" title="Klikk for værvarsling">
        <span class="toggle-icon">🌡</span>
        <div class="toggle-track"><div class="toggle-thumb"></div></div>
      </div>
      <div id="earthquakes-toggle" class="float-toggle" title="Jordskalv (USGS)">
        <span class="toggle-icon">🌋</span>
        <div class="toggle-track"><div class="toggle-thumb"></div></div>
      </div>
      <div id="iss-toggle" class="float-toggle" title="ISS — sanntidsposisjon">
        <span class="toggle-icon">🛸</span>
        <div class="toggle-track"><div class="toggle-thumb"></div></div>
      </div>
      <div id="tectonic-toggle" class="float-toggle" title="Tektoniske plategrenser">
        <span class="toggle-icon">🌍</span>
        <div class="toggle-track"><div class="toggle-thumb"></div></div>
      </div>
    </div>
  </div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
