<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planet Simulator</title>
  <link rel="stylesheet" href="css/style.css">
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/",
      "topojson-client": "https://cdn.jsdelivr.net/npm/topojson-client@3.1.0/+esm"
    }
  }
  </script>
</head>
<body>
  <div id="canvas-container">
    <div id="compass" title="Click to reset">
      <div id="compass-needle"></div>
      <span class="compass-n">N</span>
      <span class="compass-s">S</span>
    </div>
    <div id="carousel-wrap">
      <button id="carousel-prev" class="carousel-btn">&#x25B2;</button>
      <div id="carousel-viewport">
    <div id="toggle-stack">
      <div id="drag-toggle" class="float-toggle" title="Move country (click to select, drag to move)">
        <span class="toggle-icon">✋</span>
        <div class="toggle-track"><div class="toggle-thumb"></div></div>
      </div>
      <div id="labels-toggle" class="float-toggle" title="Country labels">
        <span class="toggle-icon">🚩</span>
        <div class="toggle-track"><div class="toggle-thumb"></div></div>
      </div>
<div id="borders-toggle" class="float-toggle" title="Country borders">
        <span class="toggle-icon">🗺</span>
        <div class="toggle-track"><div class="toggle-thumb"></div></div>
      </div>
      <div id="transparent-toggle" class="float-toggle" title="Transparent mode">
        <span class="toggle-icon">👁</span>
        <div class="toggle-track"><div class="toggle-thumb"></div></div>
      </div>
      <div id="equator-toggle" class="float-toggle" title="Equator">
        <span class="toggle-icon">🌐</span>
        <div class="toggle-track"><div class="toggle-thumb"></div></div>
      </div>
      <div id="capitals-toggle" class="float-toggle" title="Capitals">
        <span class="toggle-icon">🏛</span>
        <div class="toggle-track"><div class="toggle-thumb"></div></div>
      </div>
      <div id="solar-toggle" class="float-toggle" title="Solar system">
        <span class="toggle-icon">🪐</span>
        <div class="toggle-track"><div class="toggle-thumb"></div></div>
      </div>
      <div id="sun-toggle" class="float-toggle" title="Sun (day/night)">
        <span class="toggle-icon">🌞</span>
        <div class="toggle-track"><div class="toggle-thumb"></div></div>
      </div>
      <div id="citylights-toggle" class="float-toggle" title="City lights (best with sun on)">
        <span class="toggle-icon">🌃</span>
        <div class="toggle-track"><div class="toggle-thumb"></div></div>
      </div>
      <div id="aurora-toggle" class="float-toggle" title="Aurora Borealis">
        <span class="toggle-icon">🌌</span>
        <div class="toggle-track"><div class="toggle-thumb"></div></div>
      </div>
      <div id="weather-toggle" class="float-toggle" title="Click for weather forecast">
        <span class="toggle-icon">🌡</span>
        <div class="toggle-track"><div class="toggle-thumb"></div></div>
      </div>
      <div id="earthquakes-toggle" class="float-toggle" title="Earthquakes & natural disasters (USGS + NASA EONET)">
        <span class="toggle-icon">🌋</span>
        <div class="toggle-track"><div class="toggle-thumb"></div></div>
      </div>
      <div id="tectonic-toggle" class="float-toggle" title="Tectonic plate boundaries">
        <span class="toggle-icon">🌍</span>
        <div class="toggle-track"><div class="toggle-thumb"></div></div>
      </div>
      <div id="satellites-toggle" class="float-toggle" title="Satellites in orbit (real-time positions)">
        <span class="toggle-icon">🛰️</span>
        <div class="toggle-track"><div class="toggle-thumb"></div></div>
      </div>
      <div id="iss-toggle" class="float-toggle" title="ISS — real-time position">
        <span class="toggle-icon">🛸</span>
        <div class="toggle-track"><div class="toggle-thumb"></div></div>
      </div>
      <div id="countryinfo-toggle" class="float-toggle" title="Click on a country for info">
        <span class="toggle-icon">ℹ️</span>
        <div class="toggle-track"><div class="toggle-thumb"></div></div>
      </div>
      <div id="timezones-toggle" class="float-toggle" title="Time zones">
        <span class="toggle-icon">🕐</span>
        <div class="toggle-track"><div class="toggle-thumb"></div></div>
      </div>
      <div id="currents-toggle" class="float-toggle" title="Ocean currents">
        <span class="toggle-icon">🌊</span>
        <div class="toggle-track"><div class="toggle-thumb"></div></div>
      </div>
      <div id="ships-toggle" class="float-toggle" title="Live ship traffic (AIS)">
        <span class="toggle-icon">🚢</span>
        <div class="toggle-track"><div class="toggle-thumb"></div></div>
      </div>
    </div>
      </div>
      <button id="carousel-next" class="carousel-btn">&#x25BC;</button>
    </div>
  </div>
  <div id="panel-stack"></div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
